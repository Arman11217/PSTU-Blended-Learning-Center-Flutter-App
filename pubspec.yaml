name: pblc_flutter
description: PSTU Blended Learning Center - Flutter App with Firebase
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase Dependencies
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  firebase_messaging: ^15.1.0

  # UI & Navigation
  get: ^4.6.5
  google_fonts: ^6.1.0
  
  # State Management
  provider: ^6.0.0
  
  # Utilities
  intl: ^0.19.0
  image_picker: ^1.0.5
  file_picker: ^8.1.2
  url_launcher: ^6.2.0
  supabase_flutter: ^2.6.0
  
  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/